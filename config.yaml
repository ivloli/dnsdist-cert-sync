nacos:
  addr: "nacos.example.com:8848"
  namespace: "prod-namespace"
  group: "certs"
  data_id: "dnsdist-cert"
  username: "${NACOS_USERNAME}"
  password: "${NACOS_PASSWORD}"

cert:
  cert_file: "/etc/dnsdist/example.com.crt"
  key_file: "/etc/dnsdist/example.com.key"
  chain_file: ""
  raw_dump_file: "/etc/dnsdist/nacos_cert.json"
  owner: "_dnsdist"
  group: "_dnsdist"
  cert_mode: "0755"
  key_mode: "0755"
  chain_mode: "0644"
  raw_dump_mode: "0640"

dnsdist:
  binary_path: "/usr/bin/dnsdist"
  control_addr: "127.0.0.1:15199"
  control_key: "${DNSDIST_CONTROL_KEY}"
  reload_lua_command: "reloadAllCertificates()"
  # 若本机 dnsdist CLI 用法不同，可直接写完整 shell 命令覆盖默认行为。
  # reload_command: "/usr/bin/dnsdist -c 127.0.0.1:15199 -k ${DNSDIST_CONTROL_KEY} -e 'reloadAllCertificates()'"
  reload_command: ""

sync:
  poll_interval: "30s"
